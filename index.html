<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Too Early</title>
  <style>
    :root {
      --bg: #eef4ff;
      --panel: rgba(255, 255, 255, 0.9);
      --text: #18212f;
      --muted: #64748b;
      --early: #93c5fd;
      --good: #86efac;
      --perfect: #c4b5fd;
      --danger: #fca5a5;
      --line: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 4px;
      background: linear-gradient(180deg, #dbeafe 0%, #eef4ff 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .phone {
      width: min(100vw, 460px);
      height: min(100dvh, 980px);
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(241,245,249,0.96));
      border: 1px solid rgba(148,163,184,0.25);
      border-radius: 34px;
      box-shadow: 0 40px 100px rgba(0,0,0,.45);
      overflow: hidden;
      position: relative;
    }

    .notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 26px;
      background: rgba(0,0,0,0.55);
      border-radius: 0 0 18px 18px;
      z-index: 3;
    }

    .app {
      height: 100%;
      padding: 12px 10px 8px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }

    h1 {
      margin: 18px 0 0;
      font-size: 2rem;
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.96rem;
    }

    .stats { display: none; }

    .stat { display: none; }

    .label {
      color: var(--muted);
      font-size: 0.72rem;
      margin-bottom: 4px;
    }

    .value {
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .game-wrap {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #111c2f 0%, #08111b 100%);
      min-height: 0;
      height: 100%;
    }

    canvas {
      width: 100%;
      height: 100%;
      min-height: 100%;
      display: block;
      touch-action: manipulation;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
      background: linear-gradient(rgba(3,8,16,.12), rgba(3,8,16,.74));
      pointer-events: none;
    }

    .overlay.hidden { display: none; }

    .overlay-box {
      width: 100%;
      max-width: 320px;
      background: rgba(4, 9, 16, 0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,.4);
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-size: 1.65rem;
    }

    .overlay p {
      margin: 0;
      color: #dce7f8;
      line-height: 1.5;
      font-size: 0.98rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 18px;
      padding: 16px 18px;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      color: white;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 12px 30px rgba(0,0,0,.25);
    }

    .footer-tip {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.25;
      padding-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="app">
      <div>
        <h1>TOO EARLY</h1>
      </div>

      <div class="game-wrap">
        <canvas id="game" width="430" height="520"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-box">
            <h2 id="overlayTitle">Tap Start</h2>
            <p id="overlayText">Tap before the marker hits red. The later you tap, the more points you score.</p>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn">Start / Restart</button>
      </div>

    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');
    const startBtn = document.getElementById('startBtn');

    const W = canvas.width;
    const H = canvas.height;
    const TRACK_W = 92;
    const TRACK_H = H - 150;
    const TRACK_X = W / 2 - TRACK_W / 2;
    const TRACK_Y = 90;

    let state = 'idle';
    let raf = null;
    let lastTime = 0;

    let score = 0;
    let best = Number(localStorage.getItem('too-early-best') || 0);
    let combo = 0;
    let roundSpeed = 0.55;
    let marker = 0;
    let pulse = 0;
    let feedback = null;
    let roundIndex = 0;
    let scorePopups = [];


    function resetGame() {
      score = 0;
      combo = 0;
      roundSpeed = 0.55;
      roundIndex = 0;
      feedback = null;
      scorePopups = [];
      startRound();
      state = 'playing';
      overlay.classList.add('hidden');
      updateHud();
      lastTime = 0;
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(loop);
    }

    function startRound() {
      roundIndex += 1;
      marker = 0;
      feedback = null;
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min(0.033, (ts - lastTime) / 1000);
      lastTime = ts;
      if (state === 'playing') update(dt);
      render();
      raf = requestAnimationFrame(loop);
    }

    function update(dt) {
      pulse += dt * 8;
      marker += dt * roundSpeed;

      if (feedback) {
        feedback.life -= dt;
        if (feedback.life <= 0) feedback = null;
      }

      scorePopups = scorePopups
        .map((p) => ({ ...p, y: p.y - 42 * dt, life: p.life - dt }))
        .filter((p) => p.life > 0);

      const killThreshold = 0.90;
      if (marker >= killThreshold) {
        die();
        return;
      }

      updateHud();
    }

    function tapAction() {
      if (state !== 'playing') return;

      const earlyH = 0.64;
      const goodH = 0.16;
      const perfectH = 0.10;
      const goodStart = earlyH;
      const perfectStart = earlyH + goodH;
      const deadStart = earlyH + goodH + perfectH;
      const judgedMarker = marker;

      if (judgedMarker < goodStart) {
        const gain = Math.round(8 + combo * 0.5);
        score += gain;
        roundSpeed += 0.07;
        feedback = { text: 'EARLY', sub: `+${gain} • SPEED UP`, color: '#60a5fa', life: 0.7 };
        scorePopups.push({ text: `+${gain}`, x: W / 2 + 90, y: TRACK_Y + TRACK_H * judgedMarker, life: 0.9, color: '#60a5fa' });
      } else if (judgedMarker < perfectStart) {
        combo += 1;
        const gain = Math.round((20 + combo * 3) * (1 + roundSpeed));
        score += gain;
        roundSpeed += 0.03;
        feedback = { text: 'GOOD', sub: `+${gain} • STEADY`, color: '#22c55e', life: 0.7 };
        scorePopups.push({ text: `+${gain}`, x: W / 2 + 90, y: TRACK_Y + TRACK_H * judgedMarker, life: 0.9, color: '#22c55e' });
      } else if (judgedMarker < deadStart) {
        combo += 2;
        const gain = Math.round((45 + combo * 5) * (1 + roundSpeed));
        score += gain;
        roundSpeed += 0.008;
        feedback = { text: 'PERFECT', sub: `+${gain} • CONTROLLED`, color: '#8b5cf6', life: 0.8 };
        scorePopups.push({ text: `+${gain}`, x: W / 2 + 90, y: TRACK_Y + TRACK_H * judgedMarker, life: 1.0, color: '#8b5cf6' });
      } else {
        die();
        return;
      }
      if (score > best) {
        best = score;
        localStorage.setItem('too-early-best', String(best));
      }
      startRound();
    }

    function die() {
      state = 'dead';
      overlayTitle.textContent = 'Too Late';
      overlayText.textContent = `Run over. Score: ${score}. Combo: ${combo}. Hit Start and try again — it should stay fair.`;
      overlay.classList.remove('hidden');
      updateHud();
    }

    function updateHud() {}

    function render() {
      ctx.clearRect(0, 0, W, H);
      drawBackground();
      drawHeaderHint();
      drawTrack();
      drawZones();
      drawMarker();
      drawInGameHud();
      drawFeedback();
      drawScorePopups();
    }

    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#dbeafe');
      grad.addColorStop(0.6, '#eff6ff');
      grad.addColorStop(1, '#f8fbff');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 2;
      const offset = (performance.now() * 0.05) % 56;
      for (let y = -56; y < H + 56; y += 56) {
        ctx.beginPath();
        ctx.moveTo(0, y + offset);
        ctx.lineTo(W, y + offset);
        ctx.stroke();
      }
    }

    function drawHeaderHint() {}

    function drawInGameHud() {
      ctx.fillStyle = 'rgba(255,255,255,0.78)';
      roundRect(16, 14, W - 32, 62, 18);
      ctx.fill();

      ctx.fillStyle = '#18212f';
      ctx.textAlign = 'left';
      ctx.font = '700 12px Inter, sans-serif';
      ctx.fillText('SCORE', 28, 34);
      ctx.fillText('BEST', 132, 34);
      ctx.fillText('COMBO', 228, 34);
      ctx.fillText('SPEED', 330, 34);

      ctx.font = '900 22px Inter, sans-serif';
      ctx.fillText(String(score), 28, 60);
      ctx.fillText(String(best), 132, 60);
      ctx.fillText(String(combo), 228, 60);
      ctx.fillText(`${roundSpeed.toFixed(1)}x`, 330, 60);
    }

    function drawTrack() {}

    function drawZones() {
      const earlyH = TRACK_H * 0.64;
      const goodH = TRACK_H * 0.16;
      const perfectH = TRACK_H * 0.10;
      const deadH = 4;
      const deadGap = 0;
      const perfectBottom = TRACK_Y + earlyH + goodH + perfectH;

      const zoneW = TRACK_W;
      const zoneX = TRACK_X;

      ctx.fillStyle = 'rgba(147,197,253,0.72)';
      ctx.fillRect(zoneX, TRACK_Y, zoneW, earlyH);

      ctx.fillStyle = 'rgba(134,239,172,0.88)';
      ctx.fillRect(zoneX, TRACK_Y + earlyH, zoneW, goodH);

      ctx.fillStyle = 'rgba(196,181,253,0.95)';
      ctx.fillRect(zoneX, TRACK_Y + earlyH + goodH, zoneW, perfectH);

      ctx.fillStyle = 'rgba(252,165,165,1)';
      ctx.fillRect(zoneX, perfectBottom + deadGap, zoneW, deadH);

      ctx.fillStyle = '#18212f';
      ctx.font = '700 12px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('EARLY', W / 2, TRACK_Y - 14);
      ctx.fillText('GOOD', W / 2, TRACK_Y + earlyH + goodH / 2 + 5);
      ctx.fillText('PERFECT', W / 2, TRACK_Y + earlyH + goodH + perfectH / 2 + 2);
      ctx.fillText('DEAD', W / 2, perfectBottom + deadH + 18);
    }

    function drawMarker() {
      const y = TRACK_Y + TRACK_H * marker;

      ctx.strokeStyle = '#ffffff';
      ctx.shadowColor = 'rgba(255,255,255,0.28)';
      ctx.shadowBlur = 18;
      ctx.lineWidth = 4;
      ctx.lineCap = 'butt';
      ctx.beginPath();
      ctx.moveTo(TRACK_X, y);
      ctx.lineTo(TRACK_X + TRACK_W, y);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function drawFeedback() {
      if (!feedback) return;
      ctx.globalAlpha = Math.max(0, feedback.life);
      ctx.fillStyle = feedback.color;
      ctx.textAlign = 'center';
      ctx.font = '900 36px Inter, sans-serif';
      ctx.fillText(feedback.text, W / 2, TRACK_Y + TRACK_H / 2 - 10);
      ctx.font = '800 24px Inter, sans-serif';
      ctx.fillText(feedback.sub, W / 2, TRACK_Y + TRACK_H / 2 + 24);
      ctx.globalAlpha = 1;
    }

    function drawScorePopups() {
      ctx.textAlign = 'left';
      ctx.font = '900 22px Inter, sans-serif';
      for (const p of scorePopups) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, p.x, p.y);
      }
      ctx.globalAlpha = 1;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function triggerTap() {
      if (state === 'idle' || state === 'dead') return;
      tapAction();
    }

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      triggerTap();
    });
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('gesturestart', (e) => {
      e.preventDefault();
    });
    canvas.addEventListener('gesturechange', (e) => {
      e.preventDefault();
    });
    canvas.addEventListener('gestureend', (e) => {
      e.preventDefault();
    });

    startBtn.addEventListener('click', resetGame);

    updateHud();
    render();
  </script>
</body>
</html>
