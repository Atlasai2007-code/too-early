<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Too Early</title>
  <style>
    :root {
      --bg-top: #d8e8ff;
      --bg-bottom: #edf5ff;
      --text: #142033;
      --muted: #64748b;
      --track-bg: rgba(255,255,255,0.92);
      --track-outline: rgba(59,130,246,0.12);
      --hud-bg: rgba(255,255,255,0.82);
      --hud-border: rgba(148,163,184,0.18);
      --early: #9fc5ff;
      --good: #91f0b0;
      --perfect: #ccb7ff;
      --danger: #ff9ca8;
      --line: #ffffff;
      --button-top: #5aa2ff;
      --button-bottom: #3f82f8;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overscroll-behavior: none;
      touch-action: manipulation;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    }

    body {
      color: var(--text);
    }

    .app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: manipulation;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(rgba(248,251,255,0.18), rgba(237,244,255,0.72));
      backdrop-filter: blur(6px);
      z-index: 5;
    }

    .overlay.hidden { display: none; }

    .overlay-box {
      width: min(100%, 360px);
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 26px;
      padding: 22px;
      box-shadow: 0 24px 60px rgba(94,122,177,0.18);
      text-align: center;
    }

    .overlay h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 0.95;
      letter-spacing: -0.06em;
      color: #111c2e;
    }

    .overlay p {
      margin: 0 0 18px;
      color: #51627d;
      line-height: 1.5;
      font-size: 1rem;
    }

    .overlay button {
      width: 100%;
      appearance: none;
      border: none;
      border-radius: 20px;
      padding: 17px 18px;
      font-weight: 900;
      font-size: 1.05rem;
      cursor: pointer;
      background: linear-gradient(180deg, var(--button-top), var(--button-bottom));
      color: white;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        0 14px 30px rgba(63,130,248,0.26);
    }
  </style>
</head>
<body>
  <div class="app">
    <canvas id="game"></canvas>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-box">
      <h1 id="overlayTitle">TOO EARLY</h1>
      <p id="overlayText">Tap before the line reaches DEAD. Later taps score more. Perfect taps keep the speed under control.</p>
      <button id="overlayBtn">Play</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');
    const overlayBtn = document.getElementById('overlayBtn');

    let W = 0;
    let H = 0;
    let TRACK_W = 0;
    let TRACK_H = 0;
    let TRACK_X = 0;
    let TRACK_Y = 0;

    let state = 'menu';
    let raf = null;
    let lastTime = 0;
    let firstLaunch = true;

    let score = 0;
    let best = Number(localStorage.getItem('too-early-best') || 0);
    let combo = 0;
    let roundSpeed = 0.55;
    let marker = 0;
    let pulse = 0;
    let feedback = null;
    let roundIndex = 0;
    let scorePopups = [];
    let flash = 0;

    function resizeGame() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      W = rect.width;
      H = rect.height;
      TRACK_W = Math.max(96, Math.min(120, W * 0.24));
      TRACK_H = Math.max(320, H - 250);
      TRACK_X = W / 2 - TRACK_W / 2;
      TRACK_Y = 170;
    }

    function resetGame() {
      resizeGame();
      score = 0;
      combo = 0;
      roundSpeed = 0.55;
      roundIndex = 0;
      feedback = null;
      scorePopups = [];
      flash = 0;
      startRound();
      state = 'playing';
      overlay.classList.add('hidden');
      lastTime = 0;
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(loop);
    }

    function startRound() {
      roundIndex += 1;
      marker = 0;
      feedback = null;
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min(0.033, (ts - lastTime) / 1000);
      lastTime = ts;
      if (state === 'playing') update(dt);
      render();
      raf = requestAnimationFrame(loop);
    }

    function update(dt) {
      pulse += dt * 8;
      marker += dt * roundSpeed;
      flash = Math.max(0, flash - dt * 2.2);

      if (feedback) {
        feedback.life -= dt;
        if (feedback.life <= 0) feedback = null;
      }

      scorePopups = scorePopups
        .map((p) => ({ ...p, y: p.y - 44 * dt, life: p.life - dt }))
        .filter((p) => p.life > 0);

      const killThreshold = 0.90;
      if (marker >= killThreshold) {
        die();
      }
    }

    function tapAction() {
      if (state !== 'playing') return;

      const earlyH = 0.64;
      const goodH = 0.16;
      const perfectH = 0.10;
      const goodStart = earlyH;
      const perfectStart = earlyH + goodH;
      const deadStart = earlyH + goodH + perfectH;
      const judgedMarker = marker;
      const popupY = TRACK_Y + TRACK_H * judgedMarker;

      if (judgedMarker < goodStart) {
        const gain = Math.round(8 + combo * 0.5);
        score += gain;
        roundSpeed += 0.07;
        feedback = { text: 'EARLY', sub: `+${gain} • SPEED UP`, color: '#4f8ff7', life: 0.7 };
        scorePopups.push({ text: `+${gain}`, x: TRACK_X + TRACK_W + 36, y: popupY, life: 0.9, color: '#4f8ff7' });
      } else if (judgedMarker < perfectStart) {
        combo += 1;
        const gain = Math.round((20 + combo * 3) * (1 + roundSpeed));
        score += gain;
        roundSpeed += 0.03;
        feedback = { text: 'GOOD', sub: `+${gain} • STEADY`, color: '#16a34a', life: 0.7 };
        scorePopups.push({ text: `+${gain}`, x: TRACK_X + TRACK_W + 36, y: popupY, life: 0.9, color: '#16a34a' });
      } else if (judgedMarker < deadStart) {
        combo += 2;
        const gain = Math.round((45 + combo * 5) * (1 + roundSpeed));
        score += gain;
        roundSpeed += 0.008;
        feedback = { text: 'PERFECT', sub: `+${gain} • CONTROLLED`, color: '#7c3aed', life: 0.8 };
        scorePopups.push({ text: `+${gain}`, x: TRACK_X + TRACK_W + 36, y: popupY, life: 1.0, color: '#7c3aed' });
        flash = 0.32;
      } else {
        die();
        return;
      }

      if (score > best) {
        best = score;
        localStorage.setItem('too-early-best', String(best));
      }
      startRound();
    }

    function die() {
      if (state !== 'playing') return;
      state = 'dead';
      overlayTitle.textContent = 'Too Late';
      overlayText.textContent = `Score ${score} • Combo ${combo} • Best ${best}`;
      overlayBtn.textContent = 'Try Again';
      overlay.classList.remove('hidden');
      flash = 0.45;
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      drawBackground();
      drawHud();
      drawTrack();
      drawZones();
      drawMarker();
      drawFeedback();
      drawScorePopups();
      drawFlash();
    }

    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#e7f0ff');
      grad.addColorStop(0.6, '#f2f7ff');
      grad.addColorStop(1, '#fafcff');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = 'rgba(148,163,184,0.10)';
      ctx.lineWidth = 2;
      const offset = (performance.now() * 0.05) % 60;
      for (let y = -60; y < H + 60; y += 60) {
        ctx.beginPath();
        ctx.moveTo(0, y + offset);
        ctx.lineTo(W, y + offset);
        ctx.stroke();
      }
    }

    function drawHud() {
      ctx.fillStyle = 'rgba(255,255,255,0.84)';
      roundRect(18, 54, W - 36, 88, 24);
      ctx.fill();

      ctx.strokeStyle = 'rgba(148,163,184,0.18)';
      ctx.lineWidth = 1;
      roundRect(18, 54, W - 36, 88, 24);
      ctx.stroke();

      const cols = [30, 128, 226, 322];
      const labels = ['SCORE', 'BEST', 'COMBO', 'SPEED'];
      const values = [String(score), String(best), String(combo), `${roundSpeed.toFixed(1)}x`];

      ctx.textAlign = 'left';
      for (let i = 0; i < cols.length; i++) {
        ctx.fillStyle = '#64748b';
        ctx.font = '700 12px Inter, sans-serif';
        ctx.fillText(labels[i], cols[i], 84);
        ctx.fillStyle = '#142033';
        ctx.font = '900 24px Inter, sans-serif';
        ctx.fillText(values[i], cols[i], 118);
      }
    }

    function drawTrack() {
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      roundRect(TRACK_X - 16, TRACK_Y - 14, TRACK_W + 32, TRACK_H + 72, 30);
      ctx.fill();
      ctx.strokeStyle = 'rgba(59,130,246,0.10)';
      ctx.lineWidth = 1.2;
      roundRect(TRACK_X - 16, TRACK_Y - 14, TRACK_W + 32, TRACK_H + 72, 30);
      ctx.stroke();
    }

    function drawZones() {
      const earlyH = TRACK_H * 0.64;
      const goodH = TRACK_H * 0.16;
      const perfectH = TRACK_H * 0.10;
      const deadH = 4;
      const perfectBottom = TRACK_Y + earlyH + goodH + perfectH;

      ctx.fillStyle = '#9fc5ff';
      ctx.fillRect(TRACK_X, TRACK_Y, TRACK_W, earlyH);

      ctx.fillStyle = '#91f0b0';
      ctx.fillRect(TRACK_X, TRACK_Y + earlyH, TRACK_W, goodH);

      ctx.fillStyle = '#ccb7ff';
      ctx.fillRect(TRACK_X, TRACK_Y + earlyH + goodH, TRACK_W, perfectH);

      ctx.fillStyle = '#ff9ca8';
      ctx.fillRect(TRACK_X, perfectBottom, TRACK_W, deadH);

      ctx.fillStyle = '#17243a';
      ctx.textAlign = 'center';
      ctx.font = '800 13px Inter, sans-serif';
      ctx.fillText('EARLY', W / 2, TRACK_Y - 16);
      ctx.fillText('GOOD', W / 2, TRACK_Y + earlyH + goodH / 2 + 5);
      ctx.fillText('PERFECT', W / 2, TRACK_Y + earlyH + goodH + perfectH / 2 + 4);
      ctx.fillText('DEAD', W / 2, perfectBottom + 24);
    }

    function drawMarker() {
      const y = TRACK_Y + TRACK_H * marker;
      ctx.strokeStyle = '#ffffff';
      ctx.shadowColor = 'rgba(255,255,255,0.55)';
      ctx.shadowBlur = 18;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(TRACK_X, y);
      ctx.lineTo(TRACK_X + TRACK_W, y);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function drawFeedback() {
      if (!feedback) return;
      ctx.globalAlpha = Math.max(0, feedback.life);
      ctx.fillStyle = feedback.color;
      ctx.textAlign = 'center';
      ctx.font = '900 40px Inter, sans-serif';
      ctx.fillText(feedback.text, W / 2, 176);
      ctx.font = '800 22px Inter, sans-serif';
      ctx.fillText(feedback.sub, W / 2, 204);
      ctx.globalAlpha = 1;
    }

    function drawScorePopups() {
      ctx.textAlign = 'left';
      ctx.font = '900 24px Inter, sans-serif';
      for (const p of scorePopups) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, p.x, p.y);
      }
      ctx.globalAlpha = 1;
    }

    function drawFlash() {
      if (flash <= 0) return;
      ctx.fillStyle = `rgba(255,255,255,${flash * 0.32})`;
      ctx.fillRect(0, 0, W, H);
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function triggerTap() {
      if (state !== 'playing') return;
      tapAction();
    }

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      triggerTap();
    });
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('gesturestart', (e) => {
      e.preventDefault();
    });
    canvas.addEventListener('gesturechange', (e) => {
      e.preventDefault();
    });
    canvas.addEventListener('gestureend', (e) => {
      e.preventDefault();
    });

    overlayBtn.addEventListener('click', () => {
      if (firstLaunch) {
        firstLaunch = false;
      }
      resetGame();
    });

    window.addEventListener('resize', () => {
      resizeGame();
      render();
    });

    resizeGame();
    render();
  </script>
</body>
</html>
