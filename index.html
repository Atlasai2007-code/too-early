<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Too Early</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: rgba(15, 17, 21, 0.97);
      --text: #f5f5f5;
      --muted: #9ca3af;
      --early: #d1d5db;
      --good: #a3a3a3;
      --perfect: #737373;
      --danger: #262626;
      --line: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 4px;
      background: linear-gradient(180deg, #111315 0%, #0b0d10 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .phone {
      width: min(100vw, 460px);
      height: min(100vh, 980px);
      background: linear-gradient(180deg, rgba(20,22,26,0.98), rgba(12,14,17,0.98));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 34px;
      box-shadow: 0 40px 100px rgba(0,0,0,.45);
      overflow: hidden;
      position: relative;
    }

    .notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 26px;
      background: rgba(0,0,0,0.55);
      border-radius: 0 0 18px 18px;
      z-index: 3;
    }

    .app {
      height: 100%;
      padding: 18px 14px 10px;
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      gap: 10px;
    }

    h1 {
      margin: 18px 0 0;
      font-size: 2rem;
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.96rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 8px;
    }

    .stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 10px 8px;
      text-align: center;
    }

    .label {
      color: var(--muted);
      font-size: 0.72rem;
      margin-bottom: 4px;
    }

    .value {
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .game-wrap {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #111c2f 0%, #08111b 100%);
      min-height: 0;
      min-height: 420px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: manipulation;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
      background: linear-gradient(rgba(3,8,16,.12), rgba(3,8,16,.74));
      pointer-events: none;
    }

    .overlay.hidden { display: none; }

    .overlay-box {
      width: 100%;
      max-width: 320px;
      background: rgba(4, 9, 16, 0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,.4);
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-size: 1.65rem;
    }

    .overlay p {
      margin: 0;
      color: #dce7f8;
      line-height: 1.5;
      font-size: 0.98rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 18px;
      padding: 16px 18px;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, #2b2f36, #1b1e23);
      color: white;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 12px 30px rgba(0,0,0,.25);
    }

    .footer-tip {
      text-align: center;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.35;
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="app">
      <div>
        <h1>TOO EARLY</h1>
      </div>

      <div class="stats">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat"><div class="label">Best</div><div class="value" id="best">0</div></div>
        <div class="stat"><div class="label">Combo</div><div class="value" id="combo">0</div></div>
        <div class="stat"><div class="label">Speed</div><div class="value" id="speed">1.0x</div></div>
      </div>

      <div class="game-wrap">
        <canvas id="game" width="430" height="520"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-box">
            <h2 id="overlayTitle">Tap Start</h2>
            <p id="overlayText">Tap before the marker hits red. The later you tap, the more points you score.</p>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn">Start / Restart</button>
      </div>

      <div class="footer-tip">Wait longer than feels comfortable — just not too long.</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');
    const startBtn = document.getElementById('startBtn');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const comboEl = document.getElementById('combo');
    const speedEl = document.getElementById('speed');

    const W = canvas.width;
    const H = canvas.height;
    const TRACK_W = 92;
    const TRACK_H = H - 180;
    const TRACK_X = W / 2 - TRACK_W / 2;
    const TRACK_Y = 100;

    let state = 'idle';
    let raf = null;
    let lastTime = 0;

    let score = 0;
    let best = Number(localStorage.getItem('too-early-best') || 0);
    let combo = 0;
    let roundSpeed = 0.55;
    let marker = 0;
    let pulse = 0;
    let feedback = null;
    let roundIndex = 0;

    bestEl.textContent = best;

    function resetGame() {
      score = 0;
      combo = 0;
      roundSpeed = 0.55;
      roundIndex = 0;
      feedback = null;
      startRound();
      state = 'playing';
      overlay.classList.add('hidden');
      updateHud();
      lastTime = 0;
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(loop);
    }

    function startRound() {
      roundIndex += 1;
      marker = 0;
      feedback = null;
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min(0.033, (ts - lastTime) / 1000);
      lastTime = ts;
      if (state === 'playing') update(dt);
      render();
      raf = requestAnimationFrame(loop);
    }

    function update(dt) {
      pulse += dt * 8;
      marker += dt * roundSpeed;

      if (feedback) {
        feedback.life -= dt;
        if (feedback.life <= 0) feedback = null;
      }

      if (marker >= 1) {
        die();
        return;
      }

      updateHud();
    }

    function tapAction() {
      if (state !== 'playing') return;

      const goodStart = 0.68;
      const perfectStart = 0.86;

      if (marker < goodStart) {
        const gain = Math.round(8 + combo * 0.5);
        score += gain;
        feedback = { text: 'EARLY', sub: `+${gain}`, color: '#e5e7eb', life: 0.7 };
      } else if (marker < perfectStart) {
        combo += 1;
        const gain = Math.round((20 + combo * 3) * (1 + roundSpeed));
        score += gain;
        feedback = { text: 'GOOD', sub: `+${gain}`, color: '#d4d4d8', life: 0.7 };
      } else {
        combo += 2;
        const gain = Math.round((45 + combo * 5) * (1 + roundSpeed));
        score += gain;
        feedback = { text: 'PERFECT', sub: `+${gain}`, color: '#ffffff', life: 0.8 };
      }

      roundSpeed = Math.min(1.15, roundSpeed + 0.025);
      if (score > best) {
        best = score;
        localStorage.setItem('too-early-best', String(best));
      }
      startRound();
    }

    function die() {
      state = 'dead';
      overlayTitle.textContent = 'Too Late';
      overlayText.textContent = `Run over. Score: ${score}. Combo: ${combo}. Hit Start and try again — it should stay fair.`;
      overlay.classList.remove('hidden');
      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      comboEl.textContent = combo;
      speedEl.textContent = `${roundSpeed.toFixed(1)}x`;
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      drawBackground();
      drawHeaderHint();
      drawTrack();
      drawZones();
      drawMarker();
      drawFeedback();
    }

    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#181b20');
      grad.addColorStop(0.6, '#111317');
      grad.addColorStop(1, '#0b0d10');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 2;
      const offset = (performance.now() * 0.05) % 56;
      for (let y = -56; y < H + 56; y += 56) {
        ctx.beginPath();
        ctx.moveTo(0, y + offset);
        ctx.lineTo(W, y + offset);
        ctx.stroke();
      }
    }

    function drawHeaderHint() {}

    function drawTrack() {}

    function drawZones() {
      const earlyH = TRACK_H * 0.64;
      const goodH = TRACK_H * 0.16;
      const perfectH = TRACK_H * 0.10;
      const deadH = 26;
      const deadGap = 0;
      const perfectBottom = TRACK_Y + earlyH + goodH + perfectH;

      const zoneW = TRACK_W;
      const zoneX = TRACK_X;

      ctx.fillStyle = 'rgba(209,213,219,0.55)';
      ctx.fillRect(zoneX, TRACK_Y, zoneW, earlyH);

      ctx.fillStyle = 'rgba(163,163,163,0.75)';
      ctx.fillRect(zoneX, TRACK_Y + earlyH, zoneW, goodH);

      ctx.fillStyle = 'rgba(115,115,115,0.92)';
      ctx.fillRect(zoneX, TRACK_Y + earlyH + goodH, zoneW, perfectH);

      ctx.fillStyle = 'rgba(38,38,38,1)';
      ctx.fillRect(zoneX, perfectBottom + deadGap, zoneW, deadH);

      ctx.fillStyle = '#f5f5f5';
      ctx.font = '700 12px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('EARLY', W / 2, TRACK_Y - 14);
      ctx.fillText('GOOD', W / 2, TRACK_Y + earlyH + goodH / 2 + 5);
      ctx.fillText('PERFECT', W / 2, TRACK_Y + earlyH + goodH + perfectH / 2 + 2);
      ctx.fillText('DEAD', W / 2, perfectBottom + deadH + 16);
    }

    function drawMarker() {
      const y = TRACK_Y + TRACK_H * marker;

      ctx.strokeStyle = '#ffffff';
      ctx.shadowColor = 'rgba(255,255,255,0.28)';
      ctx.shadowBlur = 18;
      ctx.lineWidth = 4;
      ctx.lineCap = 'butt';
      ctx.beginPath();
      ctx.moveTo(TRACK_X, y);
      ctx.lineTo(TRACK_X + TRACK_W, y);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function drawFeedback() {
      if (!feedback) return;
      ctx.globalAlpha = Math.max(0, feedback.life);
      ctx.fillStyle = feedback.color;
      ctx.textAlign = 'center';
      ctx.font = '900 36px Inter, sans-serif';
      ctx.fillText(feedback.text, W / 2, TRACK_Y + TRACK_H / 2 - 10);
      ctx.font = '800 24px Inter, sans-serif';
      ctx.fillText(feedback.sub, W / 2, TRACK_Y + TRACK_H / 2 + 24);
      ctx.globalAlpha = 1;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function triggerTap() {
      if (state === 'idle' || state === 'dead') return;
      tapAction();
    }

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      triggerTap();
    });
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('gesturestart', (e) => {
      e.preventDefault();
    });
    canvas.addEventListener('gesturechange', (e) => {
      e.preventDefault();
    });
    canvas.addEventListener('gestureend', (e) => {
      e.preventDefault();
    });

    startBtn.addEventListener('click', resetGame);

    updateHud();
    render();
  </script>
</body>
</html>
